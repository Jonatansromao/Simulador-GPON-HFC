{% extends "base.html" %}

{% block titulo %}Recuperar Senha - Professor{% endblock %}

{% block conteudo %}
<div class="container" style="max-width:480px; margin-top:40px;">
  <h3 class="text-center">Recuperar senha (Professor)</h3>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">E-mail cadastrado</label>
      <input type="email" class="form-control" name="email" required>
    </div>
    <button type="submit" class="btn btn-warning w-100">Enviar instruções</button>
  </form>
  <div class="mt-3 text-center">
    <a href="{{ url_for('html_bp.login_professor') }}">Voltar ao login</a>
  </div>
</div>
{% endblock %}
