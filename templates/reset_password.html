{% extends "base.html" %}

{% block titulo %}Redefinir Senha{% endblock %}

{% block conteudo %}
<div class="container" style="max-width:480px; margin-top:40px;">
  <h3 class="text-center">Redefinir Senha</h3>
  <form method="POST">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="mb-3">
      <label class="form-label">Nova senha</label>
      <input type="password" class="form-control" name="senha" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirme a nova senha</label>
      <input type="password" class="form-control" name="senha_confirm" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Redefinir senha</button>
  </form>
</div>
{% endblock %}
