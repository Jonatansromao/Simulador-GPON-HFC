{% extends "base.html" %}

{% block titulo %}Recuperar Senha - Aluno{% endblock %}

{% block conteudo %}
<div class="container" style="max-width:480px; margin-top:40px;">
  <h3 class="text-center">Recuperar senha (Aluno)</h3>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">CPF (opcional)</label>
      <input type="text" class="form-control" name="cpf" placeholder="Somente números ou com máscara">
      <small class="text-muted">Se informado, o CPF será usado para validação adicional.</small>
    </div>
    <div class="mb-3">
      <label class="form-label">E-mail cadastrado</label>
      <input type="email" class="form-control" name="email" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Enviar instruções</button>
  </form>
  <div class="mt-3 text-center">
    <a href="{{ url_for('html_bp.login_aluno') }}">Voltar ao login</a>
  </div>
</div>
{% endblock %}
