{% extends "base.html" %}

{% block titulo %}Cadastro Professor{% endblock %}

{% block conteudo %}
<div class="container mt-5">
    <h2>Cadastro Professor</h2>
    <form method="POST" action="{{ url_for('html_bp.professor_register') }}">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Cadastrar</button>
    </form>

    <div class="mt-3">
        <small>Já possui conta? <a href="{{ url_for('html_bp.login_professor') }}">Faça login</a></small>
    </div>

    {% if message %}
        <div class="alert alert-danger mt-3">{{ message }}</div>
    {% endif %}
</div>
{% endblock %}
