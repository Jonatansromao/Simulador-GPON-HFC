<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Logout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .logout-box {
            max-width: 400px;
            margin: 60px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: #002f66; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="logout-box">
    <h2>Encerrar Sessão</h2>
    <p>Deseja realmente sair da sua conta?</p>
    <button id="logoutBtn" class="btn btn-danger w-100">Logout</button>
    <div id="mensagem" class="mt-3"></div>
</div>

<script>
document.getElementById("logoutBtn").addEventListener("click", async function() {
    const resposta = await fetch("/api/logout", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
    });

    const dados = await resposta.json();
    if (resposta.ok) {
        document.getElementById("mensagem").innerHTML =
            "<div class='alert alert-success'>Logout realizado com sucesso!</div>";
        setTimeout(() => {
            window.location.href = "/";
        }, 1500);
    } else {
        document.getElementById("mensagem").innerHTML =
            "<div class='alert alert-danger'>Erro ao encerrar sessão</div>";
    }
});
</script>

</body>
</html>
