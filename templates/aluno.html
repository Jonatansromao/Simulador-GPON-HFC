<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sou Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .container {
            margin-top: 40px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            max-width: 100%; /* 🔹 ocupa toda a largura no celular */
        }
        h2 {
            text-align: center;
            color: #002f66;
            margin-bottom: 25px;
        }
        .btn-custom {
            background-color: #002f66;
            color: #fff;
            font-weight: bold;
        }
        .btn-custom:hover {
            background-color: #004080;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Cadastro do Aluno</h2>
    <form method="POST">
        <!-- Dados pessoais -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">CPF</label>
                <input type="text" class="form-control" name="cpf" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" name="nome" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <!-- Escolha do modo -->
        <h5 class="mt-4">Escolha o tipo de prova</h5>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="modo" value="turma" id="turma" required>
            <label class="form-check-label" for="turma">Prova da Turma</label>
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="modo" value="simulado" id="simulado" required>
            <label class="form-check-label" for="simulado">Simulado Livre</label>
        </div>

        <!-- Campo turma aparece apenas se modo = turma -->
        <div class="mb-3">
            <label class="form-label">Turma (se aplicável)</label>
            <input type="text" class="form-control" name="turma" id="turmaInput" placeholder="Ex: TURMA01">
        </div>

        <!-- Banco de questões -->
        <div class="mb-3">
            <label class="form-label">Banco de Questões</label>
            <select class="form-select" name="sheet_name" required>
                <option value="HFC">HFC</option>
                <option value="GPON">GPON</option>
            </select>
        </div>

        <!-- Campo oculto para garantir "individual" -->
        <input type="hidden" id="turmaHidden" name="turma" value="">

        <button type="submit" class="btn btn-custom w-100">Iniciar Prova</button>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const turmaInput = document.getElementById("turmaInput");
    const turmaHidden = document.getElementById("turmaHidden");

    document.getElementById("turma").addEventListener("change", function() {
        turmaInput.disabled = false;   // habilita campo turma
        turmaHidden.value = "";        // não força nada
    });

    document.getElementById("simulado").addEventListener("change", function() {
        turmaInput.disabled = true;    // desabilita campo turma
        turmaInput.value = "";         // limpa campo turma
        turmaHidden.value = "individual"; // força valor "individual"
    });
});
</script>
  <div style="position:fixed; right:12px; bottom:12px; z-index:9999; background:rgba(17,24,39,.92); color:#fff; padding:8px 12px; border-radius:999px; font-size:.78rem; box-shadow:0 4px 12px rgba(0,0,0,.18); border:1px solid rgba(255,255,255,.14);">

  </footer>
</body>
</html>
